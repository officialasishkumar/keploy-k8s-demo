apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-order-service
  namespace: staging
  labels:
    app: sample-order-service
    environment: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-order-service
  template:
    metadata:
      labels:
        app: sample-order-service
        environment: staging
    spec:
      containers:
        - name: sample-order-service
          image: sample-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
