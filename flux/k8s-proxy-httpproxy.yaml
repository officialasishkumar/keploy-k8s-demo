# Contour HTTPProxy for Keploy k8s-proxy (TLS passthrough).
#
# Replace <YOUR_INGRESS_HOST> with the hostname that resolves to your cluster.
# This must match the host used in keploy.ingressUrl.
#
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: k8s-proxy-ingress
  namespace: keploy
  labels:
    app: k8s-proxy
spec:
  virtualhost:
    fqdn: keploy-demo.local
    tls:
      passthrough: true
  tcpproxy:
    services:
      - name: k8s-proxy
        port: 8080
